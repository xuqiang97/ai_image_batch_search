<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>AI 生图批量搜索组件原型</title>
  <script>
    const PAGE_VERSION = '20260707-002';
    (function ensureFreshVersion() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('v') !== PAGE_VERSION) {
        params.set('v', PAGE_VERSION);
        const nextUrl = `${window.location.pathname}?${params.toString()}${window.location.hash || ''}`;
        window.location.replace(nextUrl);
      }
    })();
  </script>
  <style>
    :root {
      --navy: #001a30;
      --navy-2: #06233d;
      --blue: #1f7aff;
      --blue-2: #2f6fec;
      --bg: #f3f6fb;
      --card: #ffffff;
      --line: #dbe4f0;
      --text: #122033;
      --muted: #5f6f86;
      --light: #eef5ff;
      --red: #e53535;
      --green: #15a85b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
    }
    .app { display: flex; min-height: 100vh; }
    .side {
      width: 148px;
      background: #061d31;
      color: #d7e6f5;
      flex-shrink: 0;
    }
    .brand {
      height: 44px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-weight: 700;
      font-size: 13px;
    }
    .logo {
      width: 22px; height: 22px; border-radius: 6px;
      background: radial-gradient(circle at 30% 30%, #58a6ff, #0b6bff 55%, #0b2d55 56%);
    }
    .menu-title {
      padding: 14px 10px 8px;
      font-size: 11px;
      color: #8eb7df;
    }
    .menu-item {
      height: 39px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      cursor: pointer;
      font-size: 12px;
      color: #d7e6f5;
      border-left: 3px solid transparent;
    }
    .menu-item:hover { background: rgba(255,255,255,.05); }
    .menu-item.active {
      background: #1e90ff;
      color: white;
      border-left-color: #62b4ff;
      font-weight: 600;
    }
    .main { flex: 1; min-width: 0; }
    .topbar {
      height: 44px;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      color: white;
      position: relative;
    }
    .hamb { font-size: 20px; opacity: .9; }
    .doc-link {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 18px;
      border: 1px solid #ffe08a;
      border-radius: 999px;
      background: #ffd84d;
      color: #132033;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 2px 10px rgba(255, 216, 77, .28);
    }
    .doc-link:hover {
      background: #ffca1a;
      border-color: #ffefb0;
      box-shadow: 0 3px 14px rgba(255, 216, 77, .42);
    }
    .user { font-size: 12px; }
    .page { padding: 16px 18px 28px; }
    .page-title {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 800;
    }
    h1::before {
      content: "";
      width: 5px; height: 24px; border-radius: 3px;
      background: #2c6bed;
      display: inline-block;
    }
    .quota {
      height: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      background: #eaf3ff;
      border: 1px solid #bdd6ff;
      color: #0b61ff;
      border-radius: 6px;
      font-weight: 600;
      box-shadow: 0 2px 7px rgba(35, 103, 210, .12);
    }
    .quota strong { font-size: 16px; letter-spacing: .04em; }
    .quota span { border: 1px solid #b8d3ff; background: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 500; }
    .tabs, .done-tabs {
      background: white;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      height: 42px;
      padding: 0 10px;
      gap: 24px;
    }
    .tab, .done-tab {
      height: 42px; display: flex; align-items: center;
      border-bottom: 2px solid transparent;
      color: #111827;
      cursor: pointer;
      white-space: nowrap;
    }
    .tab.active, .done-tab.active { color: #0b66ff; border-bottom-color: #0b66ff; font-weight: 600; }
    .tab em, .done-tab em { font-style: normal; color: #45627f; margin-left: 5px; }
    .danger { color: #e60012 !important; font-weight: 700; }
    .filter-card {
      background: #f8fbff;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 10px 10px 9px;
    }
    .done-filter-card {
      background: white;
      border-radius: 14px;
      padding: 14px 14px 16px;
      box-shadow: 0 1px 0 rgba(17,24,39,.04);
      border: 1px solid #e3ebf5;
    }
    .filter-row {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: nowrap;
      min-width: 0;
    }
    .filter-row + .filter-row { margin-top: 12px; }
    .label {
      color: #34445a;
      font-weight: 600;
      white-space: nowrap;
    }
    .dim-label {
      padding: 8px 14px;
      font-weight: 700;
      border-radius: 0;
      white-space: nowrap;
    }
    .dim-task { color: #00a04a; background: #dff8e9; }
    .dim-photo { color: #2366e8; background: #e9f0ff; }
    .status-group {
      display: flex;
      align-items: center;
      height: 28px;
      border: 1px solid #d9e3f1;
      border-radius: 5px;
      overflow: hidden;
      background: white;
    }
    .status-group span {
      padding: 0 11px;
      height: 100%; display: flex; align-items: center;
      border-right: 1px solid #edf2f7;
      color: #4b5f76;
      white-space: nowrap;
    }
    .status-group span.active { color: #126bff; background: #edf5ff; font-weight: 700; }
    .status-group span.red { color: #ec1f1f; font-weight: 700; }
    .status-group span.green { color: #0c9a4a; font-weight: 700; }
    .control, .input, .select {
      height: 28px;
      border: 1px solid #d5dfeb;
      border-radius: 4px;
      background: white;
      color: #26364a;
      padding: 0 10px;
      font-size: 12px;
      outline: none;
      min-width: 0;
    }
    .input::placeholder { color: #9aa7b7; }
    .select { padding-right: 26px; }
    .date { width: 168px; }
    .date.wide { width: 222px; }
    .date.done { width: 292px; }
    .count { width: 66px; }
    .search { width: 240px; }
    .search.done { width: 300px; }
    .creator { width: 180px; }
    .creator.done { width: 146px; }
    .grow-space { flex: 1 1 auto; min-width: 10px; }
    .btn {
      height: 30px;
      border: 1px solid #d5dfeb;
      background: white;
      color: #223047;
      border-radius: 4px;
      padding: 0 16px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;
    }
    .btn-primary {
      background: #236df0;
      border-color: #236df0;
      color: white;
      box-shadow: 0 2px 6px rgba(35,109,240,.18);
    }
    .btn-primary:hover { background: #165fdd; }
    .sort { margin-left: auto; display: flex; align-items: center; gap: 7px; white-space: nowrap; }
    .sort .select { width: 126px; }

    /* 批量组件 */
    .batch-wrap {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      position: relative;
      white-space: nowrap;
    }
    .batch-wrap.invalid .batch-input { border-color: #e24040; box-shadow: 0 0 0 2px rgba(226,64,64,.08); }
    .batch-field {
      width: 82px;
      height: 28px;
      border: 1px solid #d5dfeb;
      border-radius: 4px;
      background: white;
      padding: 0 8px;
      font-size: 12px;
      color: #25354a;
    }
    .batch-box {
      display: inline-flex;
      align-items: center;
      height: 28px;
      width: 205px;
      border: 1px solid #d5dfeb;
      border-radius: 4px;
      background: white;
      overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
    }
    .batch-box:focus-within { border-color: #236df0; box-shadow: 0 0 0 2px rgba(35,109,240,.10); }
    .batch-input {
      width: 100%; height: 100%; border: 0; outline: none;
      padding: 0 7px;
      font-size: 12px;
      color: #243247;
      min-width: 0;
    }
    .batch-input::placeholder { color: #8c99a8; }
    .batch-icon {
      width: 30px; height: 100%; border: 0; border-left: 1px solid #e0e8f1;
      background: #f9fbfe; color: #40546b;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; line-height: 1;
    }
    .batch-icon:hover { background: #eef5ff; color: #1e6cf0; }
    .batch-pop {
      position: absolute;
      top: calc(100% + 7px);
      right: 0;
      width: 340px;
      background: white;
      border: 1px solid #d9e3f1;
      border-radius: 6px;
      box-shadow: 0 10px 28px rgba(8,30,60,.16);
      padding: 12px;
      z-index: 100;
      display: none;
    }
    .batch-pop.open { display: block; }
    .batch-pop::before {
      content: "";
      position: absolute;
      right: 20px;
      top: -7px;
      width: 12px; height: 12px;
      background: white;
      border-left: 1px solid #d9e3f1;
      border-top: 1px solid #d9e3f1;
      transform: rotate(45deg);
    }
    .batch-pop.adjust-left { right: auto; left: 0; }
    .batch-pop.adjust-left::before { right: auto; left: 20px; }
    .pop-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
    }
    .pop-head span:last-child {
      color: #52667d; font-size: 11px; font-weight: 500;
    }
    .pop-tip {
      color: #576d86;
      font-size: 11px;
      line-height: 1.55;
      margin: 0 0 8px;
    }
    .batch-textarea {
      width: 100%;
      min-height: 108px;
      max-height: 320px;
      resize: vertical;
      border: 1px solid #8db7ff;
      border-radius: 4px;
      padding: 9px 10px;
      font-size: 12px;
      line-height: 1.55;
      outline: none;
      color: #243247;
    }
    .batch-textarea::placeholder { color: #6d7f92; }
    .pop-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 8px;
    }
    .count-tip { color: #5b6c7f; font-size: 12px; }
    .count-tip.invalid { color: #df2f2f; font-weight: 700; }
    .pop-actions { display: flex; gap: 7px; }
    .pop-actions .btn { height: 28px; padding: 0 14px; }
    .toast {
      position: fixed;
      top: 60px;
      left: 50%; transform: translateX(-50%);
      background: #12233a;
      color: white;
      border-radius: 6px;
      padding: 9px 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      opacity: 0;
      pointer-events: none;
      transition: .18s;
      z-index: 200;
    }
    .toast.show { opacity: 1; top: 72px; }
    .summary {
      margin-top: 14px;
      background: white;
      border: 1px solid #e0e8f2;
      border-radius: 10px;
      padding: 12px 14px;
      color: #30445b;
      line-height: 1.7;
    }
    .summary b { color: #0f2238; }
    .summary .proto-note {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #fff7ed;
      color: #c05621;
      border: 1px solid #fed7aa;
      font-size: 11px;
      font-weight: 700;
      margin-left: 6px;
    }
    .cards {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .card {
      height: 92px;
      background: white;
      border: 1px solid #e2eaf4;
      border-radius: 10px;
      padding: 12px;
      color: #50627a;
    }
    .card strong { display: block; color: #17243a; margin-bottom: 8px; }
    .done-shell .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      border: 1px solid #e2eaf4;
      border-radius: 13px;
      height: 64px;
      padding: 0 14px;
      margin-bottom: 14px;
    }
    .done-shell .done-tabs { height: 62px; border: 0; padding: 0; gap: 18px; }
    .done-tools { display: flex; align-items: center; gap: 8px; }
    .seg { display: inline-flex; border: 1px solid #dce6f2; border-radius: 10px; overflow: hidden; height: 34px; }
    .seg span { display: flex; align-items: center; padding: 0 12px; border-right: 1px solid #e8eef5; }
    .seg span.active { background: #236df0; color: white; font-weight: 700; }
    @media (max-width: 1380px) {
      .search { width: 205px; }
      .search.done { width: 245px; }
      .batch-box { width: 185px; }
      .creator.done { width: 132px; }
      .date.done { width: 275px; }
    }
    @media (max-width: 1220px) {
      .filter-row { flex-wrap: wrap; }
      .sort { margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand"><div class="logo"></div><span>智汇创想</span></div>
      <div class="menu-title">新版AI生图</div>
      <div class="menu-item" data-page="art-main">美工版AI生图</div>
      <div class="menu-item active" data-page="ops-main">运营版AI生图</div>
      <div class="menu-item" data-page="art-done">美工已完成生图</div>
      <div class="menu-item" data-page="ops-done">运营已完成生图</div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="hamb">☰</div>
        <a class="doc-link" href="https://github.com/xuqiang97/ai_image_batch_search" target="_blank" rel="noopener noreferrer">GitHub需求文档 ↗</a>
        <div class="user">♟ 徐强</div>
      </header>
      <section class="page" id="page"></section>
    </main>
  </div>
  <div class="toast" id="toast"></div>

<script>
const CONFIG = {
  'art-main': {
    title: '新版 AI 生图系统（美工版）', type: 'main', quota: '1500 / 1500',
    searchPh: '系统SKU / TaskID / BatchID',
    batchFields: ['TaskID','BatchID','系统SKU'],
    tabs: ['建任务（2）','生图中（0）','待审核（3）','待推送（0）','已完成（今日：0 | 需确认：3）']
  },
  'ops-main': {
    title: '新版 AI 生图系统（运营版）', type: 'main', quota: '1600 / 1600',
    searchPh: '店铺 / ASIN / TaskID / BatchID',
    batchFields: ['TaskID','BatchID','ASIN','店铺'],
    tabs: ['建任务（11）','生图中（0）','待审核（0）','待推送（0）','已完成（今日：0 | 需确认：1）']
  },
  'art-done': {
    title: '查看已完成生图（美工版）', type: 'done', searchPh: '搜索 SKU / TaskID',
    batchFields: ['TaskID','系统SKU']
  },
  'ops-done': {
    title: '查看已完成生图（运营版）', type: 'done', searchPh: '搜索店铺 / ASIN / TaskID',
    batchFields: ['TaskID','ASIN','店铺']
  }
};
let currentPage = 'ops-main';
const state = {};
function getState(page) {
  if (!state[page]) state[page] = { tab: 4, batchField: 'TaskID', batchValue: '', normalSearch: '', lastQuery: null, invalid: false };
  return state[page];
}
function normalize(raw) {
  const text = (raw || '').replace(/，/g, ',').replace(/\t/g, ',').replace(/\n/g, ',');
  const arr = text.split(',').map(x => x.trim()).filter(Boolean);
  const seen = new Set();
  const unique = [];
  arr.forEach(v => {
    const key = v.toLowerCase();
    if (!seen.has(key)) { seen.add(key); unique.push(v); }
  });
  return unique;
}
function toLines(raw) { return normalize(raw).join('\n'); }
function toComma(raw) { return normalize(raw).join(','); }
function validateBatch(page) {
  const s = getState(page);
  const count = normalize(s.batchValue).length;
  s.invalid = count > 500;
  return { count, invalid: s.invalid };
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
function render() {
  const cfg = CONFIG[currentPage];
  const s = getState(currentPage);
  const page = document.getElementById('page');
  page.innerHTML = cfg.type === 'main' ? renderMain(cfg, s) : renderDone(cfg, s);
  bindPageEvents();
  validateAndPaint(currentPage);
}
function renderBatch(cfg, s) {
  const invalidClass = s.invalid ? ' invalid' : '';
  return `
    <div class="batch-wrap${invalidClass}" data-batch>
      <span class="label">批量</span>
      <select class="batch-field" data-batch-field>
        ${cfg.batchFields.map(f => `<option value="${f}" ${s.batchField === f ? 'selected' : ''}>${f}</option>`).join('')}
      </select>
      <div class="batch-box">
        <input class="batch-input" data-batch-input placeholder="多个用英文逗号" value="${escapeHtml(s.batchValue)}" />
        <button class="batch-icon" data-open-pop title="批量输入">☰</button>
      </div>
      <div class="batch-pop" data-pop>
        <div class="pop-head"><span>批量输入</span><span>Enter 换行</span></div>
        <div class="pop-tip">兼容中英文逗号、Tab粘贴；空值忽略，重复去重。</div>
        <textarea class="batch-textarea" data-textarea placeholder="一行一个值，最多500个，右下角拖拽可调整高度。">${escapeHtml(toLines(s.batchValue))}</textarea>
        <div class="pop-foot">
          <span class="count-tip" data-count>有效 0 / 500</span>
          <div class="pop-actions">
            <button class="btn" data-clear>清空</button>
            <button class="btn btn-primary" data-apply>应用并查询</button>
          </div>
        </div>
      </div>
    </div>`;
}
function renderMain(cfg, s) {
  return `
    <div class="page-title"><h1>${cfg.title}</h1><div class="quota">今日额度：<strong>${cfg.quota}</strong><span>LinkFox</span> ↻</div></div>
    <div class="tabs">${cfg.tabs.map((t,i)=>`<div class="tab ${i===s.tab?'active':''}" data-tab="${i}">${t.replace('需确认','<span class="danger">需确认</span>')}</div>`).join('')}</div>
    <div class="filter-card">
      <div class="filter-row">
        <span class="label">任务健康度:</span>
        <div class="status-group"><span class="active">全部</span><span class="red">需确认</span><span class="red">轻微异常</span><span class="green">正常</span><span>已确认</span></div>
        <span class="label">创建时间:</span><input class="control date wide" value="2026-07-06  →  2026-07-06" readonly>
        <select class="select"><option>审核通过</option></select><select class="select"><option>≥</option></select><input class="input count" placeholder="张数">
        <span class="label">搜索:</span><input class="input search" data-normal-search placeholder="${cfg.searchPh}" value="${escapeHtml(s.normalSearch)}">
        ${renderBatch(cfg, s)}
        <button class="btn btn-primary" data-query>查询</button><button class="btn" data-reset>重置</button>
        <div class="sort"><span class="label">排序:</span><select class="select"><option>更新时间倒排</option></select></div>
      </div>
    </div>
    ${renderSummary(cfg, s)}
    <div class="cards"><div class="card"><strong>任务卡片示意</strong>真实页面不新增摘要模块，列表按现有逻辑展示。</div><div class="card"><strong>当前 Tab 生效</strong>批量查询只在当前状态 Tab 内过滤。</div><div class="card"><strong>组件复用</strong>后续页面可按字段配置接入。</div></div>`;
}
function renderDone(cfg, s) {
  return `
    <div class="done-shell">
      <div class="page-title"><h1>${cfg.title}</h1></div>
      <div class="top-row">
        <div class="done-tabs"><div class="done-tab active">全部图片 <em>50</em></div><div class="done-tab">通过图片 <em>43</em></div><div class="done-tab">不通过图片 <em>7</em></div></div>
        <div class="done-tools"><span class="label">排序</span><select class="select"><option>创建时间</option></select><button class="btn">↓ 倒序</button><div class="seg"><span class="active">紧凑</span><span>标准</span><span>宽松</span></div></div>
      </div>
      <div class="done-filter-card">
        <div class="filter-row">
          <span class="dim-label dim-task">任务维度</span>
          <span class="label">创建人</span><input class="control creator done" placeholder="请选择（可多选）">
          <span class="label">时间</span><select class="select"><option>创建时间</option></select><input class="control date done" value="2026-06-30 00:00:00  →  2026-07-06 23:59:59" readonly>
          <span class="label">任务图张数</span><select class="select"><option>审核通过张数</option></select><select class="select"><option>≥</option></select><input class="input count" placeholder="不限">
          <span class="label">搜索</span><input class="input search done" data-normal-search placeholder="${cfg.searchPh}" value="${escapeHtml(s.normalSearch)}">
          ${renderBatch(cfg, s)}
        </div>
        <div class="filter-row">
          <span class="dim-label dim-photo">图片维度</span>
          <span class="label">模型</span><select class="select"><option>全部模型</option></select>
          <span class="label">图片类型</span><select class="select"><option>全部类型</option></select>
          <span class="label">侵权禁售检测</span><select class="select"><option>全部</option></select>
          <div class="grow-space"></div><button class="btn btn-primary" data-query>查询</button><button class="btn" data-reset>重置</button>
        </div>
      </div>
      ${renderSummary(cfg, s)}
      <div class="cards"><div class="card"><strong>图片卡片示意</strong>查询结果仍按现有任务分组和图片卡片展示。</div><div class="card"><strong>已完成页补齐</strong>普通搜索与批量外层输入框支持 Enter 查询。</div><div class="card"><strong>不支持 BatchID</strong>已完成页本期字段与当前单个搜索保持一致。</div></div>
    </div>`;
}
function renderSummary(cfg, s) {
  const vals = normalize(s.batchValue);
  const tabText = cfg.type === 'main' ? cfg.tabs[s.tab].replace(/<[^>]*>/g,'') : '全部图片';
  const normal = s.normalSearch ? `普通搜索 = “${escapeHtml(s.normalSearch)}”` : '普通搜索为空';
  const batch = vals.length ? `批量 ${s.batchField} ∈ [${escapeHtml(vals.slice(0,5).join(', '))}${vals.length>5?' ...':''}]，共 ${vals.length} 个` : '批量为空';
  const invalid = vals.length > 500 ? '；当前批量值超出 500，上述条件不会发起查询' : '';
  return `<div class="summary"><b>查询关系说明</b><span class="proto-note">原型说明，不进入真实页面</span><br>
  当前页：${cfg.title}；当前范围：${tabText}<br>
  最终查询 = 当前权限 / 当前 Tab / 当前筛选条件 AND ${normal} AND ${batch}${invalid}<br>
  批量内部多个值为 OR；普通搜索与批量字段不互斥，二者共同收敛结果。</div>`;
}
function bindPageEvents() {
  document.querySelectorAll('.menu-item').forEach(el => el.onclick = () => { currentPage = el.dataset.page; document.querySelectorAll('.menu-item').forEach(x=>x.classList.remove('active')); el.classList.add('active'); render(); });
  document.querySelectorAll('[data-tab]').forEach(el => el.onclick = () => { getState(currentPage).tab = Number(el.dataset.tab); render(); });
  document.querySelectorAll('[data-normal-search]').forEach(input => {
    input.oninput = e => { getState(currentPage).normalSearch = e.target.value; };
    input.onkeydown = e => { if (e.key === 'Enter') query(); };
  });
  document.querySelectorAll('[data-query]').forEach(btn => btn.onclick = query);
  document.querySelectorAll('[data-reset]').forEach(btn => btn.onclick = resetPage);
  const batch = document.querySelector('[data-batch]');
  if (!batch) return;
  const s = getState(currentPage);
  const field = batch.querySelector('[data-batch-field]');
  const input = batch.querySelector('[data-batch-input]');
  const pop = batch.querySelector('[data-pop]');
  const textarea = batch.querySelector('[data-textarea]');
  const open = batch.querySelector('[data-open-pop]');
  field.onchange = e => { s.batchField = e.target.value; };
  input.oninput = e => { s.batchValue = e.target.value; validateAndPaint(currentPage); };
  input.onkeydown = e => { if (e.key === 'Enter') query(); };
  open.onclick = e => { e.stopPropagation(); openPop(batch); };
  textarea.oninput = e => updateCountFromTextarea(textarea, batch)
  textarea.onkeydown = e => { e.stopPropagation(); };
  batch.querySelector('[data-clear]').onclick = e => { e.stopPropagation(); s.batchValue = ''; input.value = ''; textarea.value = ''; validateAndPaint(currentPage); updateCountFromTextarea(textarea, batch); };
  batch.querySelector('[data-apply]').onclick = e => { e.stopPropagation(); const vals = normalize(textarea.value); if (!vals.length) return showToast('请输入批量搜索内容'); if (vals.length > 500) { validateAndPaint(currentPage, vals.length); return showToast(`超出上限：${vals.length} / 500`); } s.batchValue = vals.join(','); input.value = s.batchValue; closePop(batch, false); query(); };
  document.addEventListener('click', closeOnOutside, { once: true });
  document.onkeydown = e => { if (e.key === 'Escape') { const b = document.querySelector('[data-batch]'); if (b) closePop(b, true); } };
}
function openPop(batch) {
  const s = getState(currentPage);
  const pop = batch.querySelector('[data-pop]');
  const textarea = batch.querySelector('[data-textarea]');
  textarea.value = toLines(s.batchValue);
  pop.classList.add('open');
  requestAnimationFrame(() => {
    const r = pop.getBoundingClientRect();
    pop.classList.toggle('adjust-left', r.right > window.innerWidth - 12);
    updateCountFromTextarea(textarea, batch);
    textarea.focus();
  });
}
function closePop(batch, sync) {
  const pop = batch.querySelector('[data-pop]');
  if (!pop.classList.contains('open')) return;
  if (sync) {
    const s = getState(currentPage);
    const textarea = batch.querySelector('[data-textarea]');
    const input = batch.querySelector('[data-batch-input]');
    s.batchValue = toComma(textarea.value);
    input.value = s.batchValue;
    validateAndPaint(currentPage);
  }
  pop.classList.remove('open');
}
function closeOnOutside(e) {
  const batch = document.querySelector('[data-batch]');
  if (batch && !batch.contains(e.target)) closePop(batch, true);
}
function updateCountFromTextarea(textarea, batch) {
  const count = normalize(textarea.value).length;
  const tip = batch.querySelector('[data-count]');
  if (count > 500) { tip.textContent = `超出上限：${count} / 500`; tip.classList.add('invalid'); }
  else { tip.textContent = `有效 ${count} / 500`; tip.classList.remove('invalid'); }
}
function validateAndPaint(page, forceCount) {
  const s = getState(page);
  const count = forceCount ?? normalize(s.batchValue).length;
  const invalid = count > 500;
  s.invalid = invalid;
  const batch = document.querySelector('[data-batch]');
  if (batch) batch.classList.toggle('invalid', invalid);
  return { count, invalid };
}
function query() {
  const { count, invalid } = validateAndPaint(currentPage);
  if (invalid) return showToast(`超出上限：${count} / 500`);
  const s = getState(currentPage);
  s.lastQuery = Date.now();
  showToast('已按当前条件查询，页码回到第 1 页');
  render();
}
function resetPage() {
  const s = getState(currentPage);
  s.batchField = 'TaskID';
  s.batchValue = '';
  s.normalSearch = '';
  s.invalid = false;
  showToast('已重置筛选条件');
  render();
}
function escapeHtml(str) {
  return String(str || '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
}
render();
</script>
</body>
</html>
